# ---------------------
# Stage-1 proof training with process-level rewards from a per-prefix judge.
# Training uses token-level raw chunk rewards plus heuristic chunk advantages
# under the reinforce loss path.
# ---------------------
defaults:
    - base
    - _self_

model_path: Qwen/Qwen3-4B-Instruct-2507
model_revision: main

eval_every_n_versions: 12800

preprocess:
  shared_memory_entry_size: 2000000000

finetune:
  attempts: 16
  train_batch_size: 32
  valid_batch_size: 32
  gradient_accumulation_passes: 32
  seq_length: 24576
  seq_parallel: 2
  learning_rate: 1.0e-6
  lr_scheduler_type: constant_with_warmup
  num_warmup_steps: 0
  max_train_steps: 250
  rl:
    policy_loss: reinforce
    use_advantages: true
    precomputed_token_advantages: true
    relu_log_p_weights: false
    divide_advantage_by_std: false
    group_normalization: false
    entropy_bonus: 0.0001
    final_entropy_bonus: ${finetune.rl.entropy_bonus}
    overlong_filtering: false
  save_checkpoint_steps: 20
  push_to_hub: false
  hub_model_id: null
  hub_model_revision: main
  hub_ignore_patterns:
    - "*.pt"
    - "*.pth"

llm:
  parameters:
    max_tokens: 16384
    temperature: 0.8
  reasoning_delimiters: []
  wandb_table:
    enabled: true
    keep_last_k_groups: 32
    log_every_n_groups: 32

test_llm:
  parameters:
    max_tokens: 16384
    temperature: 0.8
    top_p: 0.95
    top_k: 20

llm_grader:
  local: false
  provider: gemini
  name: google/gemini-3.1-flash-lite-preview
  sampling_kwargs:
    temperature: 0
    max_output_tokens: 16384
    thinking_level: medium
  reasoning_delimiters: []
  prompt_name: v1
  wandb_table:
    enabled: true
    keep_last_k_groups: 32
    log_every_n_groups: 32

process_grader:
  enabled: true
  provider: gemini
  name: google/gemini-3.1-flash-lite-preview
  prompt_name: exp_rl_pr_v1
  delimiter: "###"
  is_clip_length: false
  normalize_by_token_count: true
  max_concurrency: 64
  timeout_seconds: 900
  max_retries: 3
  retry_backoff: [15, 30, 60, 90, 120]
  sampling_kwargs:
    temperature: 0
    max_output_tokens: 4096
    thinking_level: medium

actor:
  llm_max_rollouts: 32
  max_retries: 10
  shared_memory_entry_size: 2000000000
  rollout_policy: pipelinerl.domains.math.generate_math_rollout
  system_prompt: null
  task_template: |-
    Generate a rigorous proof to the following question:

    {task}

environment:
  _target_: pipelinerl.domains.math.MathProofEnvironment
  model_name: ${llm_grader.name}
  sampling_kwargs: ${llm_grader.sampling_kwargs}
  prompt_name: ${llm_grader.prompt_name}
  provider: ${llm_grader.provider}

dataset_loader: pipelinerl.domains.math.load_datasets
dataset_loader_params:
  seed: 42
  proof_train_type: exp_rl
train_dataset_names:
  - hub_id: violetxi/FineProofs-Stage-1
    split: train
test_dataset_names:
  - hub_id: lm-provers/ProofBench
    split: !!str 24_25

vllm_config:
  use_v1: false
  vllm_kwargs:
    dtype: bfloat16
    gpu-memory-utilization: 0.85
    num-scheduler-steps: 1
    disable-log-requests: ""
    disable-frontend-multiprocessing: ""
    max-num-seqs: ${actor.llm_max_rollouts}
    max-num-batched-tokens: 16384
    max-model-len: ${finetune.seq_length}
    return-tokens-as-token-ids: ""
    tensor-parallel-size: 1
    pipeline-parallel-size: 1
    generation-config: vllm

wandb:
  use_wandb: true

world:
  replicas: 1
  actor_fraction: 6
  preprocessor_fraction: 0
  finetune_fraction: 2
  env_replicas: 1
  actor_group_port: 9000
  environment_start_port: 7777
