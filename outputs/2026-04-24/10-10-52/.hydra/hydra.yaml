  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /hai/scratch/ziyxiang/QED-Nano
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /hai/scratch/ziyxiang/verl-oer/verl/trainer/config
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /hai/scratch/ziyxiang/QED-Nano/outputs/2026-04-24/10-10-52
    choices:
      genrm: dp_genrm
      reward_model: dp_reward_model
      critic: dp_critic
      rollout@actor_rollout_ref.rollout: rollout
      ref@actor_rollout_ref.ref: dp_ref
      data: legacy_data
      npu_profile@trainer.npu_profile: npu_profile
      actor@actor_rollout_ref.actor: dp_actor
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
