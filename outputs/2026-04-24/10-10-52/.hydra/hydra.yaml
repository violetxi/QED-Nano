hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - algorithm.adv_estimator=grpo
    - data.train_files=['data/instruct/pope_full/test.parquet','data/instruct/int_dataset/train.parquet']
    - data.val_files=['data/instruct/aime-2025/test.parquet','data/instruct/aime-2026/train.parquet']
    - data.train_batch_size=36
    - data.max_prompt_length=4096
    - data.max_response_length=16384
    - data.filter_overlong_prompts=True
    - data.truncation=error
    - data.use_chat_template=True
    - data.enable_thinking=False
    - actor_rollout_ref.model.path=Qwen/Qwen3-4B-Instruct-2507
    - actor_rollout_ref.actor.optim.lr=1e-6
    - actor_rollout_ref.model.use_remove_padding=True
    - actor_rollout_ref.actor.ppo_mini_batch_size=18
    - actor_rollout_ref.actor.use_kl_loss=True
    - actor_rollout_ref.actor.kl_loss_coef=0.001
    - actor_rollout_ref.actor.kl_loss_type=low_var_kl
    - actor_rollout_ref.actor.entropy_coeff=0
    - actor_rollout_ref.actor.use_dynamic_bsz=True
    - actor_rollout_ref.actor.ppo_max_token_len_per_gpu=32768
    - actor_rollout_ref.actor.clip_ratio_low=0.2
    - actor_rollout_ref.actor.clip_ratio_high=0.28
    - actor_rollout_ref.model.enable_gradient_checkpointing=True
    - actor_rollout_ref.actor.fsdp_config.param_offload=False
    - actor_rollout_ref.actor.fsdp_config.optimizer_offload=False
    - actor_rollout_ref.rollout.max_model_len=32768
    - actor_rollout_ref.rollout.log_prob_micro_batch_size_per_gpu=2
    - actor_rollout_ref.rollout.tensor_model_parallel_size=2
    - actor_rollout_ref.rollout.name=vllm
    - actor_rollout_ref.rollout.temperature=0.8
    - actor_rollout_ref.rollout.n=10
    - actor_rollout_ref.rollout.gpu_memory_utilization=0.85
    - actor_rollout_ref.rollout.tensor_model_parallel_size=2
    - actor_rollout_ref.rollout.max_num_batched_tokens=32768
    - actor_rollout_ref.rollout.max_num_seqs=2048
    - actor_rollout_ref.rollout.disable_log_stats=False
    - actor_rollout_ref.rollout.val_kwargs.temperature=0.8
    - actor_rollout_ref.rollout.val_kwargs.n=4
    - actor_rollout_ref.rollout.val_kwargs.do_sample=True
    - actor_rollout_ref.ref.log_prob_micro_batch_size_per_gpu=2
    - actor_rollout_ref.ref.fsdp_config.param_offload=True
    - genrm.model.path=Qwen/Qwen3-4B-Instruct-2507
    - genrm.rollout.prompt_length=32768
    - genrm.rollout.response_length=2048
    - genrm.rollout.gpu_memory_utilization=0.8
    - genrm.rollout.tensor_model_parallel_size=1
    - genrm.n_gpus=2
    - +custom_reward_function.clip_length=True
    - +custom_reward_function.norm_strategy=smooth
    - +custom_reward_function.prompt_template_path=verl/utils/prompt_templates/math_likelihood_judge.py
    - algorithm.use_kl_in_reward=False
    - trainer.critic_warmup=0
    - trainer.logger=["console","wandb"]
    - trainer.log_val_generations=50
    - trainer.project_name=verl_exp_rl_qwen3-4b_instruct
    - trainer.experiment_name=dense_outcome
    - trainer.n_gpus_per_node=8
    - trainer.nnodes=1
    - trainer.default_local_dir=checkpoints/pope_int_qwen3-4b/dense_outcome/
    - trainer.save_freq=30
    - trainer.test_freq=10
    - trainer.total_epochs=5
  job:
    name: main_rl_genrm
    chdir: null
